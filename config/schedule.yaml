# 크롤링 및 분석 스케줄 설정
# APScheduler cron format

crawlers:
  precedent:
    # 대법원 판례: 매일 오전 9시, 오후 3시
    cron: "0 9,15 * * *"
    enabled: true
    timeout_sec: 900  # 15분
    circuit_breaker_threshold: 3

  high_court:
    # 고등법원 판례: 매일 오전 10시
    cron: "0 10 * * *"
    enabled: true
    timeout_sec: 900

  kcomwel:
    # 근로복지공단 정책: 매일 오전 11시
    cron: "0 11 * * *"
    enabled: true
    timeout_sec: 600

  moel:
    # 고용노동부 정책: 매일 오후 2시
    cron: "0 14 * * *"
    enabled: true
    timeout_sec: 600

  naver_trend:
    # 네이버 트렌드: 매주 월요일 오전 8시
    cron: "0 8 * * 1"
    enabled: true
    timeout_sec: 300

  competitor:
    # 경쟁사 모니터링: 매주 화요일 오전 10시
    cron: "0 10 * * 2"
    enabled: true
    timeout_sec: 600

engines:
  think:
    # Think 엔진: 크롤링 완료 30분 후 자동 실행 (트리거 기반)
    auto_trigger: true
    batch_mode: false  # true로 변경 시 일간 배치로 전환
    batch_cron: "0 18 * * *"  # 매일 오후 6시

  self_diagnose:
    # 자기진단: 매주 일요일 오후 9시
    cron: "0 21 * * 0"
    enabled: true

  monthly_report:
    # 월간 보고서: 매월 1일 오전 9시
    cron: "0 9 1 * *"
    enabled: true

# 재시도 설정
retry:
  max_attempts: 3
  backoff_base_sec: 2  # 지수 백오프: 2, 4, 8초
  rate_limit_sec: 2  # 요청 간 최소 간격
