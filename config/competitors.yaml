# 경쟁사 모니터링 설정

competitors:
  - name: "법무법인 A"
    blog_url: "https://example-lawfirm-a.com/blog"
    rss_url: null
    tags:
      - 산재
      - 업무상재해
    enabled: false  # URL 확정 후 활성화

  - name: "노무법인 B"
    blog_url: "https://example-labor-b.com/blog"
    rss_url: null
    tags:
      - 산재보험
      - 재해보상
    enabled: false

  # 실제 경쟁사 정보는 대표님 확인 후 추가

# 크롤링 설정
crawl_options:
  max_posts_per_site: 10  # 사이트당 최대 수집 게시물 수
  lookback_days: 30  # 최근 30일 게시물만 수집
  extract_fields:
    - title
    - content
    - published_date
    - author
    - tags
