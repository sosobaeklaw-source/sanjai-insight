# Railway Autoscaling Configuration for sanjai-insight
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m src.app"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Resource limits and autoscaling
[deploy.resources]
# Base resources (always allocated)
replicas = 1
cpuLimit = 1.0  # 1 vCPU
memoryLimit = 2048  # 2GB RAM

# Autoscaling rules
[[deploy.autoscaling]]
metric = "cpu"
target = 80  # Scale up when CPU > 80%
minReplicas = 1
maxReplicas = 3

[[deploy.autoscaling]]
metric = "memory"
target = 90  # Scale up when Memory > 90%
minReplicas = 1
maxReplicas = 3

[[deploy.autoscaling]]
metric = "requests"
target = 100  # Scale up when requests/sec > 100
minReplicas = 1
maxReplicas = 3

# Environment-specific settings
[deploy.env]
LOG_LEVEL = "INFO"
ENVIRONMENT = "production"
WORKER_POOL_SIZE = "4"  # Number of worker threads

# Development environment (separate service)
[environments.development]
[environments.development.deploy]
startCommand = "python -m src.app"
[environments.development.deploy.resources]
replicas = 1
cpuLimit = 0.5
memoryLimit = 512

# Staging environment
[environments.staging]
[environments.staging.deploy]
startCommand = "python -m src.app"
[environments.staging.deploy.resources]
replicas = 1
cpuLimit = 1.0
memoryLimit = 1024
